services:
  keldron-agent:
    build: .
    environment:
      # Defaults are localhost-only; published ports require listening on all interfaces inside the container.
      KELDRON_OUTPUT_PROMETHEUS_HOST: "0.0.0.0"
      KELDRON_HEALTH_BIND: "0.0.0.0:8081"
    ports:
      - "9100:9100"
      - "8081:8081"
    volumes:
      - ./configs/keldron-agent.example.yaml:/etc/keldron/keldron-agent.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    # For NVIDIA GPU access (requires nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
