services:
  keldron-agent:
    build: .
    ports:
      - "9100:9100"
      - "8081:8081"
    volumes:
      - ./configs/keldron-agent.example.yaml:/etc/keldron/keldron-agent.yaml:ro
    restart: unless-stopped
