# Keldron Agent Configuration

agent:
  id: "agent-rack-01"            # Unique agent identifier
  poll_interval: "2s"            # How often to poll adapters (2s–5m). Use 10s–30s in production to reduce CPU/network load.
  log_level: "info"              # debug | info | warn | error
  shutdown_timeout: "30s"        # Graceful shutdown deadline

# Adapter configurations (S-002+)
adapters:
  dcgm:
    enabled: false
    poll_interval: "2s"
    endpoint: "localhost:5555"
    use_stub: false                # Use synthetic GPU data (no NVIDIA libs needed)
    gpu_ids: [0]                   # GPU device indices to monitor
    collect:                       # Metric groups to collect
      temperature: true
      power: true
      utilization: true
      memory: true
      clocks: true
      throttle: true
    connection:                    # DCGM connection retry settings
      retry_interval: "5s"
      max_retries: 0              # 0 = infinite retries
  rocm:
    enabled: false
    poll_interval: "2s"
    rocm_smi_path: "/opt/rocm/bin/rocm-smi"
    collection_method: "cli"       # "cli" (exec rocm-smi) or "library" (future)
    gpu_indices: []               # Empty = all GPUs, or [0, 1, 2, 3]
  pdu:
    enabled: false
    poll_interval: "2s"
  snmp_pdu:
    enabled: false
    poll_interval: "2s"
    version: "v2c"               # "v2c" or "v3"
    community: "public"           # v2c
    username: ""                  # v3
    auth_protocol: "SHA"          # MD5, SHA, SHA256
    auth_passphrase: ""
    priv_protocol: "AES"          # DES, AES, AES256
    priv_passphrase: ""
    targets:
      - address: "192.168.1.100:161"
        pdu_id: "pdu-1"
        rack_ids: ["rack-01", "rack-02", "rack-03"]
        vendor: "servertech"      # servertech, raritan, apc, generic
      - address: "192.168.1.101:161"
        pdu_id: "pdu-2"
        rack_ids: ["rack-04", "rack-05", "rack-06"]
        vendor: "raritan"
    retry:
      max_attempts: 3
      backoff_initial: "1s"
      backoff_max: "30s"
    timeout: "5s"
  temperature:
    enabled: false
    poll_interval: "2s"
    stale_threshold: 5
    sensors:
      - address: "192.168.1.200:161"
        protocol: "snmp"
        sensor_id: "temp-rack01-inlet"
        rack_id: "rack-01"
        position: "inlet"
        community: "public"
        oid: "1.3.6.1.4.1.xxx.1.1.0"
      - address: "192.168.1.201:502"
        protocol: "modbus"
        sensor_id: "temp-rack01-outlet"
        rack_id: "rack-01"
        position: "outlet"
        unit_id: 1
        register_address: 100
        register_type: "holding"
        scale_factor: 0.1
  kubernetes:
    enabled: false
    kubeconfig: ""           # Empty = in-cluster config
    namespace: ""            # Empty = all namespaces
    resync_interval: "5m"
    gpu_resource_names:
      - "nvidia.com/gpu"
      - "amd.com/gpu"
    node_to_rack_map:              # Used by kubernetes adapter for GPU pod → rack assignment
      gpu-node-01: "rack-01"
      gpu-node-02: "rack-01"
      gpu-node-03: "rack-02"
  slurm:
    enabled: false
    slurmrestd_url: "http://slurmctld:6820"
    api_version: "v0.0.40"
    auth_token: ""
    poll_interval: "2s"
    timeout: "10s"
    node_to_rack_map:
      gpu-node-01: "rack-A1"
      gpu-node-02: "rack-A1"
      gpu-node-03: "rack-A2"

# Rack mapping for normalizer (S-003) — used by the normalizer, not the kubernetes adapter.
# Values may intentionally differ from node_to_rack_map when the normalizer uses a
# different rack naming scheme (e.g. facility zone identifiers vs sequential IDs).
# For temperature sensors, add sensor_id -> rack_id (e.g. temp-rack01-inlet: "rack-01")
# For snmp_pdu, Source is the rack_id from targets; add entries for each rack.
rack_mapping:
  gpu-node-01: "rack-A1"
  gpu-node-02: "rack-A1"
  gpu-node-03: "rack-A2"
  temp-rack01-inlet: "rack-01"
  temp-rack01-outlet: "rack-01"
  rack-01: "rack-A1"
  rack-02: "rack-A1"
  rack-03: "rack-A2"
  rack-04: "rack-B1"
  rack-05: "rack-B1"
  rack-06: "rack-B2"

# gRPC target for telemetry sender (S-004)
sender:
  target: "localhost:50051"
  tls:
    enabled: true
    cert_file: "/etc/keldron-agent/agent.crt"
    key_file: "/etc/keldron-agent/agent.key"
    ca_file: "/etc/keldron-agent/ca.crt"
  batch_size: 100
  flush_interval: "2s"

# Buffer settings (S-005)
buffer:
  ring_size: 10000               # In-memory ring buffer capacity (points)
  wal_dir: "/var/lib/keldron-agent/wal"
  wal_max_size: "500MB"

# Health endpoint (S-007)
health:
  enabled: true
  bind: "127.0.0.1:8081"         # Default localhost only; use 0.0.0.0:8081 for remote probes
